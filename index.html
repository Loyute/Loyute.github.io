<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Image Compare Viewer</title>
    <script src="https://unpkg.com/image-compare-viewer@1.5.0/dist/image-compare-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/image-compare-viewer/dist/image-compare-viewer.min.css">
    <style>
      
      .image-compare-wrapper {
            max-width: 1000px;
            height: auto;
            margin: 0 auto;
        }
    </style>
  </head>
  <body class="bg-gray-100">
    <main>
      <div class="container">
        <div class="row">
          <div class="col">
            <div id="image-compare" class="image-compare-wrapper shadow-lg rounded">
              <img src="https://i.imgur.com/cRsd75X.png" alt="">
              <img src="https://i.imgur.com/h6CdqG3.png" alt="">
            </div>
          </div>
        </div>
      </div>
      
    </main>

    <script>

      let config = {
        controlColor: "#4a5568",
        controlShadow: false,
        startingPoint: 75,
        showLabels: true,
        smoothing : false,
      }

      let element = document.getElementById("image-compare");
      new ImageCompare(element).mount();

    </script>
  </body>
</html>
